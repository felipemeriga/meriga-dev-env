set -g mouse on
set -g set-clipboard on

# Time (ms) tmux waits after Esc to see if it's part of an escape sequence.
# The 500ms default delays every Esc press in Neovim (nvim checkhealth wants < 300).
set -sg escape-time 10

# Forward terminal focus events so Neovim's 'autoread' and focus autocmds work.
set -g focus-events on

# Pass extended (CSI u) key sequences through to applications like Neovim,
# so Cmd-key chords sent by the terminal reach nvim as <D-c>/<D-w>.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Plugins (managed by TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum settings
set -g @continuum-restore 'on'      # restore last saved session automatically on tmux start
set -g @continuum-save-interval '15' # auto-save every 15 minutes (default)
set -g @continuum-boot 'on'         # auto-start the tmux server on boot/login (systemd user service)

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
