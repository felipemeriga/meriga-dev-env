set -g mouse on
set -g set-clipboard on

# Plugins (managed by TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum settings
set -g @continuum-restore 'on'      # restore last saved session automatically on tmux start
set -g @continuum-save-interval '15' # auto-save every 15 minutes (default)
set -g @continuum-boot 'on'         # auto-start the tmux server on boot/login (systemd user service)

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
